<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sheikh Sahab</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,400&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Full page background styling */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Top Trendy Birthday Header Text */
        .birthday-header {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
            padding: 0 15px;
            z-index: 10;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #ff3366; 
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: pointer;
            margin-top: 40px;
        }

        /* Envelope Top Flap (Closed State) */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 115px solid #ff4d79;
            transform-origin: top;
            transition: transform 0.4s ease-in-out, z-index 0.2s;
            z-index: 5; /* Starts on top to cover the card completely */
        }

        /* When envelope is open - Flap flips UP correctly */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1; /* Goes behind the card after opening */
            border-top-color: #ff4d79;
        }

        /* Envelope Front Folds (Main pocket covering front) */
        .envelope-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #ff1a53;
            border-right: 160px solid #ff1a53;
            border-top: 110px solid transparent;
            border-bottom: 110px solid #ff1a53;
            border-radius: 0 0 10px 10px;
            z-index: 4;
        }

        /* Letter/Card Styling (Completely hidden inside initially) */
        .letter-card {
            position: absolute;
            bottom: 5px; /* Pushed down inside the envelope so it doesn't peek out */
            left: 12px;
            width: 296px;
            background: #fffdf6;
            border-radius: 12px;
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 2; /* Stays below the flap when closed */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s; /* Delay added so it waits for flap to open */
            text-align: center;
        }

        /* Card lifts up completely after flap finishes opening */
        .envelope-wrapper.open .letter-card {
            transform: translateY(-190px);
            z-index: 6; /* Becomes top-most layer so text is fully clickable/readable */
        }

        /* Text Styling inside the card */
        .letter-card h1 {
            font-size: 17px;
            color: #4a2c11;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .letter-card p {
            font-size: 13.5px;
            color: #5c3a21;
            line-height: 1.6;
            margin: 0;
            font-weight: 400;
        }

        /* Big Number "17" on Envelope front */
        .envelope-number {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 95px;
            font-weight: bold;
            color: #ff99bb;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            z-index: 4; /* Keeps it on the front fold pocket */
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .envelope-wrapper.open .envelope-number {
            opacity: 0.3; /* Becomes subtle when card comes on top */
        }

        /* Next Button (Cake cutting transition) */
        .next-btn {
            display: none; /* Initially hidden until envelope opens */
            margin-top: 40px;
            padding: 12px 30px;
            background: #ffffff;
            color: #ff1a53;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 100;
            border: 2px solid transparent;
        }

        .next-btn:hover {
            transform: scale(1.05);
            background: #ff1a53;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="birthday-header">
        Happy Birthday mera bacha 🎂🎉🫀🌈☺️
    </div>

    <div class="envelope-wrapper" id="envelope" onclick="toggleEnvelope()">
        
        <div class="envelope-number">17</div>

        <div class="letter-card">
            <h1>HAPPY BIRTHDAY MERI JAN 😊🌻👑🌈</h1>
            <p>Aj ap ka 17th birthday h, aj ap ka din h. Ham sath m to cake cut nhi kar sakte, lakin ese hi sahi chalen, ab jaldi se cake cut karen meri ♦ jan 😊😘</p>
        </div>

    </div>

    <a href="cake.html" class="next-btn" id="nextButton">Next 🎂</a>

    <script>
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            const nextBtn = document.getElementById('nextButton');
            
            envelope.classList.toggle('open');
            
            // Agar envelope khul gaya hai to button display karein thode delay ke baad
            if(envelope.classList.contains('open')) {
                setTimeout(() => {
                    nextBtn.style.display = 'inline-block';
                }, 600);
            } else {
                nextBtn.style.display = 'none';
            }
        }
    </script>

</body>
</html>
