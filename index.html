<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Meri Jan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe6e6, #ffb3ba);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .heading-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 40px;
            z-index: 10;
            max-width: 85%;
        }

        h1 {
            color: #d63384;
            margin: 0;
            font-size: 1.5rem;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: scale(1.03);
        }

        .envelope {
            position: relative;
            width: 280px;
            height: 180px;
            background: #ff3366;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #ff4d79;
            transform-origin: top;
            transition: transform 0.4s ease-in-out;
            z-index: 3;
        }

        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .letter {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 260px;
            height: 160px;
            background: #fffdf6;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.5s ease-in-out;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            opacity: 0;
            text-align: center;
        }

        .envelope.open .letter {
            transform: translateY(-90px);
            opacity: 1;
            z-index: 4;
            height: auto;
        }

        .letter h2 {
            color: #b32400;
            margin-top: 0;
            font-size: 1.1rem;
        }

        .letter p {
            color: #444;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .next-btn {
            display: none;
            margin-top: 30px;
            padding: 12px 30px;
            background: #ffffff;
            color: #ff3366;
            border: 2px solid #ff3366;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.2);
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .next-btn:hover {
            background: #ff3366;
            color: white;
        }
    </style>
</head>
<body>

    <div class="heading-container">
        <h1>Happy Birthday mera bacha 17 🎂🎉💖🌈😊</h1>
    </div>

    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope" id="envelope">
            <div class="letter">
                <h2>HAPPY BIRTHDAY MERI JAN 😊</h2>
                <p>lakin ese hi sahi chalen, ab jaldi se cake cut karen meri ♦ jan 😊😘</p>
            </div>
        </div>
    </div>

    <a href="cake.html" class="next-btn" id="nextBtn">Next 🎂</a>

    <script>
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            const nextBtn = document.getElementById('nextBtn');
            
            envelope.classList.add('open');
            setTimeout(() => {
                nextBtn.style.display = 'block';
            }, 600);
        }
    </script>

</body>
    </html>
