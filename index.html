<style>
    /* Full page background styling */
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-image: url('your-background-image-url.jpg'); /* Agar aapki background image koi specific hai to uska naam/URL yahan likhein */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        font-family: 'Arial', sans-serif;
    }

    /* Envelope Container */
    .envelope-wrapper {
        position: relative;
        width: 320px;
        height: 220px;
        background-color: #ff3366; /* Main envelope base color */
        border-radius: 0 0 10px 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin-top: 150px; /* Card ko nikalne ke liye space */
    }

    /* Envelope Top Flap (Open state) */
    .envelope-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-bottom: 110px solid transparent; /* Flap open positioning */
        z-index: 5;
    }

    /* Envelope Front Left & Right Folds */
    .envelope-wrapper::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid #ff1a53;
        border-right: 160px solid #ff1a53;
        border-top: 110px solid transparent;
        border-bottom: 110px solid #ff1a53;
        border-radius: 0 0 10px 10px;
        z-index: 4;
    }

    /* Letter/Card Styling */
    .letter-card {
        position: absolute;
        bottom: 20px; /* Adjust default position inside envelope */
        left: 10px;
        width: 300px;
        background: #fffdf6;
        border-radius: 8px;
        padding: 20px;
        box-sizing: border-box;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        z-index: 2;
        transition: transform 0.5s ease;
        text-align: center;
    }

    /* Lifted animation for the card when opened */
    .envelope-wrapper.open .letter-card {
        transform: translateY(-120px);
        z-index: 6; /* Lifafe se upar dikhne ke liye */
    }

    /* Big Number "17" Styling on Envelope */
    .envelope-number {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 80px;
        font-weight: bold;
        color: #ff99bb;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        z-index: 5; /* Folds ke upar dikhane ke liye */
        pointer-events: none;
    }
        </style>
