<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Full page background styling */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #ff3366; 
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-top: 140px; /* Space for card to lift up */
        }

        /* Envelope Top Flap (Closed State) */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 115px solid #ff4d79;
            transform-origin: top;
            transition: transform 0.4s ease, border-top-color 0.2s, z-index 0.2s;
            z-index: 5;
        }

        /* Perfect Real Open Animation (Flips upward) */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
            border-top-color: transparent;
        }

        /* Envelope Front Folds (Main pocket) */
        .envelope-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #ff1a53;
            border-right: 160px solid #ff1a53;
            border-top: 110px solid transparent;
            border-bottom: 110px solid #ff1a53;
            border-radius: 0 0 10px 10px;
            z-index: 4;
        }

        /* Letter/Card Styling */
        .letter-card {
            position: absolute;
            bottom: 15px;
            left: 10px;
            width: 300px;
            background: #fffdf6;
            border-radius: 12px;
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        /* Card lifts up completely out of the envelope */
        .envelope-wrapper.open .letter-card {
            transform: translateY(-180px);
            z-index: 6; 
        }

        /* Text Styling inside the card (Trendy Aesthetic) */
        .letter-card h1 {
            font-size: 18px;
            color: #4a2c11;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .letter-card p {
            font-size: 14px;
            color: #5c3a21;
            line-height: 1.6;
            margin: 0;
            font-weight: 400;
        }

        /* Big Number "17" on Envelope */
        .envelope-number {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 95px;
            font-weight: bold;
            color: #ff99bb;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            z-index: 5; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope" onclick="toggleEnvelope()">
        
        <div class="envelope-number">17</div>

        <div class="letter-card">
            <h1>HAPPY BIRTHDAY MERI JAN 😊🌻👑🌈</h1>
            <p>Aj ap ka 17th birthday h, aj ap ka din h. Ham sath m to cake cut nhi kar sakte, lakin ese hi sahi chalen, ab jaldi se cake cut karen meri ♦ jan 😊😘</p>
        </div>

    </div>

    <script>
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.classList.toggle('open');
        }
    </script>

</body>
</html>
