<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Junaid</title>
    <!-- Beautiful cursive font for the handwritten letter -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0d1b;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Main Container matching the exact screenshot layout */
        .birthday-card {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            /* Exact background matching the bottom dark festive theme of the screenshot */
            background: linear-gradient(to bottom, rgba(11, 13, 27, 0.2), rgba(11, 13, 27, 0.85)), 
                        url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=600&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 20px 0;
            overflow: hidden;
        }

        /* Top Section: Exact Cake Banner Image from screenshot */
        .top-banner {
            width: 100%;
            height: 38%;
            /* Beautiful AI Birthday Cake & Lights Banner simulation */
            background: url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Dimming overlay on top banner to make the neon text pop perfectly */
        .top-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* Neon Pink Main Title text matching the screenshot exactly */
        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.9), 0 0 20px rgba(255, 51, 102, 0.6);
            letter-spacing: 2px;
            line-height: 1.2;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Middle Envelope Section */
        .envelope-container {
            width: 100%;
            height: 220px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            cursor: pointer;
            margin-top: -10px;
        }

        /* Solid Base for Pink Envelope */
        .envelope {
            position: relative;
            width: 88%;
            height: 180px;
            background: #d61c4e; /* Darker interior tone */
            border-radius: 0 0 8px 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Front flaps overlapping matching the pocket look */
        .envelope::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff4d79;
            clip-path: polygon(0% 100%, 50% 60%, 100% 100%);
            z-index: 5;
            border-radius: 0 0 8px 8px;
        }
        .envelope::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff3366;
            clip-path: polygon(0% 0%, 48% 55%, 0% 100%, 100% 100%, 52% 55%, 100% 0%);
            z-index: 4;
            border-radius: 0 0 8px 8px;
        }

        /* Top Flap - Shuru me perfectly BAND rahega */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #b5123b;
            clip-path: polygon(0% 0%, 50% 60%, 100% 0%);
            transform-origin: top;
            transition: transform 0.5s ease, z-index 0.4s ease;
            z-index: 6; /* Hidden on top of everything when closed */
        }

        /* Touch hote hi Flap beautifully upar ko open hoga */
        .envelope-container.opened .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* Handwritten Letter inside - perfectly hidden at start */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 6%;
            width: 88%;
            background: #fffdf4;
            border-radius: 10px;
            padding: 20px 15px;
            z-index: 3;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.15);
            text-align: center;
            transition: transform 0.7s ease, z-index 0.3s ease;
            transform: translateY(0) scale(0.9);
            background-image: radial-gradient(rgba(0,0,0,0.02) 15%, transparent 16%);
            background-size: 16px 16px;
        }
        
        /* Touch hote hi Letter upar reveal hoga exact height par */
        .envelope-container.opened .letter {
            transform: translateY(-120px) scale(1.02);
            z-index: 7;
        }

        /* Cursive Text styling matching screenshot */
        .letter-text {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: #4a2c11;
            line-height: 1.3;
            font-weight: 700;
        }
        .letter-emoji {
            font-size: 20px;
            vertical-align: middle;
        }

        /* Big Pink Foil "17" Balloons at bottom of envelope */
        .foil-balloons {
            position: absolute;
            bottom: -55px;
            font-size: 95px;
            font-weight: 700;
            color: #ff99bb;
            text-shadow: 2px 2px 0px #ff4d79, 4px 4px 12px rgba(0,0,0,0.4);
            z-index: 8;
            letter-spacing: -4px;
            font-family: 'Poppins', sans-serif;
            pointer-events: none;
            opacity: 0.95;
        }

        /* Bottom "Chalen Cake Cut Karen!" Rounded Button */
        .bottom-btn {
            width: 90%;
            background: linear-gradient(90deg, #ff3366, #ff5e85);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 51, 102, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10;
            transition: transform 0.2s;
        }
        .bottom-btn:active {
            transform: scale(0.98);
        }

        /* Little colorful paper confetti elements inside the letter */
        .confetti-piece {
            position: absolute;
            width: 5px;
            height: 10px;
            opacity: 0.7;
            z-index: 5;
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <div class="birthday-card">
        
        <!-- Top Half Section matching the Cake and Title Banner -->
        <div class="top-banner">
            <h1 class="main-title">HAPPY<br>BIRTHDAY MERA<br>BACHA</h1>
        </div>

        <!-- Middle Section: Lifafa and Foil Balloons -->
        <div class="envelope-container" id="envelopeContainer" onclick="openEnvelopeSurprise()">
            
            <div class="envelope">
                <!-- Top Flap (Keeps it closed securely) -->
                <div class="flap"></div>
                
                <!-- The Letter popping up on touch -->
                <div class="letter" id="letter">
                    <p class="letter-text">
                        HAPPY BIRTHDAY MERI JAN <span class="letter-emoji">😊</span>🌻👑🌈<br>
                        Aj ap ka 17th birthday h,<br>
                        aj ap ka din h. Ham sath<br>
                        m to cake cut nhi kar sakte,<br>
                        lakin ese hi sahi chalen, ab<br>
                        jaldi se cake cut karen meri<br>
                        ♦ jan <span class="letter-emoji">😊😘</span>
                    </p>
                </div>
            </div>

            <!-- Foil Metallic Balloon "17" overlapping the envelope -->
            <div class="foil-balloons">17</div>
        </div>

        <!-- Bottom Navigation Button -->
        <button class="bottom-btn" onclick="goToCakePage(event)">
            Chalen Cake Cut Karen! 🥳
        </button>

    </div>

    <!-- Exact verbatim voiceover audio file referenced -->
    <audio id="birthdayAudio" src="lifafa wala .m4a" preload="auto"></audio>

    <script>
        // Envelope toggle open function with audio play trigger
        function openEnvelopeSurprise() {
            var container = document.getElementById("envelopeContainer");
            var audio = document.getElementById("birthdayAudio");
            
            if (!container.classList.contains("opened")) {
                container.classList.add("opened");
                
                // Plays your "lifafa wala .m4a" recording
                audio.play().catch(function(error) {
                    console.log("Audio trigger blocked:", error);
                });
            }
        }

        // Action trigger for the next cake page step
        function goToCakePage(event) {
            event.stopPropagation();
            alert("Ab chalte hain digital cake cutting section par...");
            // window.location.href = "cake.html"; 
        }

        // Creates decorative confetti sprinkles on the letter sheet
        function createConfetti() {
            const letter = document.getElementById('letter');
            const colors = ['#ff4773', '#22d3ee', '#fbbf24', '#a855f7', '#4ade80'];
            for (let i = 0; i < 15; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 85 + 5 + '%';
                piece.style.top = Math.random() * 85 + 5 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                letter.appendChild(piece);
            }
        }
        window.onload = createConfetti;
    </script>
</body>
  </html>
