<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sheikh Sahab</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,400;0,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Base Styling - Poori website par fix background aapki pic ka */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            /* Aapki beautiful picture dono screens ke liye permanent set kar di hai */
            background-image: url('IMG-20260605-WA0035(1).jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Hide sections easily */
        .hidden {
            display: none !important;
        }

        /* Glassmorphism/Translucent overlay for text readability over the image */
        .header-box {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            max-width: 90%;
        }

        /* --- SCREEN 1: ENVELOPE STYLES --- */
        .birthday-header {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 0.5px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .envelope-container-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px; /* Space from header */
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #ff3366; 
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Envelope Top Flap (Closed State) */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 115px solid #ff4d79;
            transform-origin: top;
            transition: transform 0.4s ease-in-out, z-index 0.2s;
            z-index: 5;
        }

        /* When envelope is open - Flap flips UP correctly */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
            border-top-color: #ff4d79;
        }

        /* Envelope Front Folds (Main pocket) */
        .envelope-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #ff1a53;
            border-right: 160px solid #ff1a53;
            border-top: 110px solid transparent;
            border-bottom: 110px solid #ff1a53;
            border-radius: 0 0 10px 10px;
            z-index: 4;
        }

        /* Letter/Card Styling (Completely hidden inside initially) */
        .letter-card {
            position: absolute;
            bottom: 5px;
            left: 12px;
            width: 296px;
            background: #fffdf6;
            border-radius: 12px;
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
            text-align: center;
        }

        /* Card lifts up completely after flap finishes opening */
        .envelope-wrapper.open .letter-card {
            transform: translateY(-190px);
            z-index: 6;
        }

        .letter-card h1 { font-size: 16px; color: #4a2c11; margin-top: 0; margin-bottom: 12px; font-weight: 600; }
        .letter-card p { font-size: 13px; color: #5c3a21; line-height: 1.6; margin: 0; }

        /* Big Number "17" on Envelope front */
        .envelope-number {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 95px;
            font-weight: bold;
            color: #ff99bb;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            z-index: 4;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .envelope-wrapper.open .envelope-number { opacity: 0.3; }

        /* Next Button Styling */
        .next-btn {
            display: none;
            margin-top: 40px;
            padding: 12px 40px;
            background: #ffffff;
            color: #ff1a53;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .next-btn:hover { transform: scale(1.05); background: #ff1a53; color: #ffffff; }


        /* --- SCREEN 2: CAKE STYLES --- */
        #cakeSection {
            /* Content pushed slightly to the bottom to prevent covering faces in the background */
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .cake-container {
            position: relative;
            width: 280px;
            height: 220px;
            cursor: pointer;
            z-index: 10;
            margin-top: 20px;
        }

        .candle-group {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 15;
        }

        .candle {
            width: 10px;
            height: 45px;
            background: linear-gradient(to right, #ffd700, #ffa500);
            border-radius: 3px;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 18px;
            background-color: #ff9f43;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ff9f43, 0 0 20px #ff3366;
            animation: flicker 0.6s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); }
        }

        /* 3D Premium Cake Layers matching the image */
        .cake-left, .cake-right {
            position: absolute;
            bottom: 0;
            width: 140px;
            height: 140px;
            background: #fffdf6;
            border-top: 12px solid #fff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 8px solid #e0dbcd;
        }

        .cake-left { left: 0; border-radius: 20px 0 0 20px; background: linear-gradient(to right, #fcfaf2, #fffdf6); }
        .cake-right { right: 0; border-radius: 0 20px 20px 0; background: linear-gradient(to left, #f7f5ed, #fffdf6); }

        .cake-left::before, .cake-right::before {
            content: '🌸✨🌸'; position: absolute; top: -12px; font-size: 14px; width: 100%; text-align: center; opacity: 0.8;
        }
        
        .cake-text {
            position: absolute;
            bottom: 45px;
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #4a3b32;
            z-index: 12;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .cake-container.cut .cake-left { transform: translateX(-45px) rotate(-6deg); }
        .cake-container.cut .cake-right { transform: translateX(45px) rotate(6deg); }
        .cake-container.cut .candle-group, .cake-container.cut .cake-text { opacity: 0; }

        .knife {
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 50px;
            transform: rotate(-45deg);
            transition: all 0.5s ease;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        .cake-container.cut .knife { opacity: 0; transform: translate(-60px, 120px) rotate(0deg); }

        /* Success Message Popup */
        .success-message {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s ease 0.4s;
            margin-top: 25px;
            color: white;
            background: rgba(255, 4d, 121, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 35px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.4);
            z-index: 10;
        }

        .cake-container.cut + .success-message { opacity: 1; transform: scale(1); }
        .success-message h3 { margin: 0; font-size: 18px; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

    <div id="envelopeSection" class="envelope-container-box">
        <div class="header-box" style="margin-bottom: 40px;">
            <div class="birthday-header">
                Happy Birthday mera bacha 17 🎂🎉🫀🌈☺️
            </div>
        </div>

        <div class="envelope-wrapper" id="envelope" onclick="toggleEnvelope()">
            <div class="envelope-number">17</div>
            <div class="letter-card">
                <h1>HAPPY BIRTHDAY MERI JAN 😊🌻👑🌈</h1>
                <p>Aj ap ka 17th birthday h, aj ap ka din h. Ham sath m to cake cut nhi kar sakte, lakin ese hi sahi chalen, ab jaldi se cake cut karen meri ♦ jan 😊😘</p>
            </div>
        </div>

        <button class="next-btn" id="nextButton" onclick="goToCakeScreen()">Next 🎂</button>
    </div>


    <div id="cakeSection" class="hidden">
        <div class="header-box">
            <h2 style="color: #fff; font-size: 18px; font-weight: 600; margin: 0; text-align: center;" id="instruction-text">
                Tap on the Cake to Cut it! 🎂✨
            </h2>
        </div>

        <div class="cake-container" id="cake" onclick="cutCake()">
            <div class="candle-group">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="knife">🔪</div>
            <div class="cake-text">17 Years ♡</div>
            <div class="cake-left"></div>
            <div class="cake-right"></div>
        </div>

        <div class="success-message">
            <h3>YAYYY! Cake Cut Ho Gaya! 🎉🥳</h3>
        </div>
    </div>


    <script>
        // Screen 1: Open/Close Envelope system
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            const nextBtn = document.getElementById('nextButton');
            
            envelope.classList.toggle('open');
            
            if(envelope.classList.contains('open')) {
                setTimeout(() => {
                    nextBtn.style.display = 'inline-block';
                }, 700);
            } else {
                nextBtn.style.display = 'none';
            }
        }

        // Screen 2: Switch smoothly to Cake cutting without breaking background
        function goToCakeScreen() {
            document.getElementById('envelopeSection').classList.add('hidden');
            document.getElementById('cakeSection').classList.remove('hidden');
        }

        // Screen 2: Cake cutting animation and confetti burst
        function cutCake() {
            const cake = document.getElementById('cake');
            const heading = document.getElementById('instruction-text');
            
            if (!cake.classList.contains('cut')) {
                cake.classList.add('cut');
                heading.innerHTML = "Happy Birthday Once Again! ❤️";

                // Grand Confetti Burst Celebration
                var duration = 3.5 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({ particleCount: 6, angle: 60, spread: 60, origin: { x: 0, y: 0.8 } });
                    confetti({ particleCount: 6, angle: 120, spread: 60, origin: { x: 1, y: 0.8 } });
                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());
            }
        }
    </script>

</body>
    </html>
